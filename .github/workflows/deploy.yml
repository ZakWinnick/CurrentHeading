name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Daily rebuild so the YouTube and Fourthwall data stays fresh
  # without anyone touching the repo.
  schedule:
    - cron: "0 11 * * *"  # 11:00 UTC = 04:00 PT

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build site
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          BEHOLD_FEED_ID: ${{ secrets.BEHOLD_FEED_ID }}
          FOURTHWALL_PUBLIC_TOKEN: ${{ secrets.FOURTHWALL_PUBLIC_TOKEN }}
          FOURTHWALL_COLLECTION_SLUG: ${{ vars.FOURTHWALL_COLLECTION_SLUG }}
          FOURTHWALL_SHOP_HOST: ${{ vars.FOURTHWALL_SHOP_HOST }}
          PATREON_ACCESS_TOKEN: ${{ secrets.PATREON_ACCESS_TOKEN }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
