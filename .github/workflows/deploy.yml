name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Daily rebuild so YouTube, Fourthwall, and Patreon data stay fresh
  # without anyone touching the repo. GitHub Actions cron runs in UTC,
  # so we register both DST and standard-time slots and let the guard
  # job below skip whichever one isn't actually 03:00 PT.
  schedule:
    - cron: "0 10 * * *"  # 03:00 PT during PDT (Mar–Nov)
    - cron: "0 11 * * *"  # 03:00 PT during PST (Nov–Mar)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=America/Los_Angeles date +%H)
          if [ "$HOUR" = "03" ]; then
            echo "Local hour is 03 PT; proceeding."
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Local hour is $HOUR PT; skipping the off-DST cron firing."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build site
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          BEHOLD_FEED_ID: ${{ secrets.BEHOLD_FEED_ID }}
          FOURTHWALL_PUBLIC_TOKEN: ${{ secrets.FOURTHWALL_PUBLIC_TOKEN }}
          FOURTHWALL_COLLECTION_SLUG: ${{ vars.FOURTHWALL_COLLECTION_SLUG }}
          FOURTHWALL_SHOP_HOST: ${{ vars.FOURTHWALL_SHOP_HOST }}
          PATREON_ACCESS_TOKEN: ${{ secrets.PATREON_ACCESS_TOKEN }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
